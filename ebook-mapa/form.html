<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-color: #1a365d; /* Azul autoridade (Jurídico) */
            --accent-color: #f6ad55;  /* Laranja para o botão (Contraste) */
            --bg-gradient: linear-gradient(135deg, #f7fafc 0%, #edf2f7 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        .badge {
            background: #c6f6d5;
            color: #22543d;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        p.description {
            color: #4a5568;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #2d3748;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: #ed8936;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #a0aec0;
        }

        .loading-spinner {
            display: none;
            margin-top: 10px;
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <span class="badge">Método Validado: 6º Lugar TRT-2</span>
    <h1>O Mapa da Aprovação</h1>
    <p class="description">Descubra como saí do zero até o 6º lugar para Analista do TRT2. Baixe o guia prático com meu método de estudo.</p>

    <form id="leadForm">
        <div class="form-group">
            <label for="nome">Nome Completo</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome..." required>
        </div>
        
        <div class="form-group">
            <label for="email">E-mail Principal</label>
            <input type="email" id="email" name="email" placeholder="nome@exemplo.com" required>
        </div>
        
        <input type="hidden" name="origem" value="concurseirotop10_blog">
        
        <button type="submit" id="submitBtn">QUERO O EBOOK GRATUITO</button>
        <div id="loading" class="loading-spinner">Enviando seu guia...</div>
    </form>

    <p class="footer-text">🔒 Seus dados estão seguros e nunca enviaremos spam.</p>
</div>

<script>
document.getElementById('leadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');
    
    // Feedback visual de carregamento
    submitBtn.style.display = 'none';
    loading.style.display = 'block';
    
    const data = {
        nome: e.target.nome.value,
        email: e.target.email.value,
        origem: e.target.origem.value
    };

    try {
        const response = await fetch('https://n8n.devoluapp.cloud/webhook/captacao-mapa-concurseiro-top10', {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify(data)
        });

        if (response.ok) {
            window.location.href = 'https://concurseirotop10.blog/ebook-mapa/obrigado.html';
        } else {
            throw new Error('Falha no envio');
        }
    } catch (error) {
        console.error('Erro:', error);
        alert('Ops! Algo deu errado. Tente novamente em instantes.');
        submitBtn.style.display = 'block';
        loading.style.display = 'none';
    }
});
</script>

</body>
</html>
